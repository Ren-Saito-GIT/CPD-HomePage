
<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cryptid</title>
	   <style>
		   body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #181a1b; color: #fff; }
		   header, section { max-width: 1800px; margin: 32px auto; padding: 32px; border-radius: 12px; background: #23272a; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		   h1, h2 { color: #ff0000; }
		   .nav-menu { display: flex; gap: 48px; list-style: none; padding: 0; margin: 16px 0 0 0; justify-content: center; font-size: 1.3em; }
		   .nav-menu a { color: #00eaff; text-decoration: none; font-weight: bold; font-size: 1.1em; padding: 8px 20px; border-radius: 6px; transition: background 0.2s; }
		   .nav-menu a:hover { background: #222; color: #fff; }
		   .ad-area { display: flex; justify-content: center; align-items: center; height: 320px; background: #111; border-radius: 8px; margin-bottom: 32px; }
		   .ad-area img { max-height: 280px; max-width: 100%; }
		   .sponsors { display: flex; flex-wrap: wrap; gap: 32px; }
		   .sponsor { background: #2c2f33; padding: 20px 32px; border-radius: 8px; min-width: 220px; text-align: center; font-size: 1.2em; }
		   .news-list { list-style: none; padding: 0; }
		   .news-list li { margin-bottom: 16px; background: #222; padding: 16px 24px; border-radius: 6px; font-size: 1.1em; }
	   </style>
</head>
<body>
	   <header>
		   <h1>Cryptid</h1>
		   <nav>
			   <ul class="nav-menu">
				   <li><a href="#member">Member</a></li>
				   <li><a href="#sponsor">Sponsor</a></li>
				   <li><a href="#news">News</a></li>
				   <li><a href="#other">Other</a></li>
			   </ul>
		   </nav>
	   </header>

	   <!-- ①広告となる画像または動画（仮画像） -->
	   <section id="member">
		   <h2>広告</h2>
		   <div class="ad-area">
			   <img src="https://via.placeholder.com/600x200?text=広告エリア" alt="広告画像">
			   <!-- 動画の場合は <video> タグに差し替え可 -->
		   </div>
	   </section>

	   <!-- ②スポンサー情報 -->
	   <section id="sponsor">
		   <h2>スポンサー</h2>
		   <div class="sponsors">
			   <div class="sponsor">スポンサーA株式会社</div>
			   <div class="sponsor">スポンサーB Inc.</div>
			   <div class="sponsor">スポンサーC合同会社</div>
		   </div>
	   </section>

	   <!-- ③チームで発信しているNews -->
	   <section id="news">
		   <h2>チームNews</h2>
		   <ul class="news-list">
			   <li>2026/04/01　新メンバー加入のお知らせ</li>
			   <li>2026/03/28　大会出場決定！</li>
			   <li>2026/03/15　公式グッズ販売開始</li>
		   </ul>
	   </section>

	   <!-- Otherセクション（仮） -->
	   <section id="other">
		   <h2>Other</h2>
		   <p>その他の情報は今後追加予定です。</p>
	   </section>
</body>
</html>
